<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Scanner Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f4f9; max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        select, input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: #007aff; color: white; border: none; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.98); background: #0056b3; }
        #status { color: #555; font-size: 0.9em; text-align: center; min-height: 1.2em; margin: 10px 0; }
        h2 { text-align: center; margin-top: 0; color: #1c1c1e; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🧾 Receipt Scanner</h2>
        <input type="file" accept="image/*" capture="camera" id="cameraInput">
        
        <div id="status">Ready to scan...</div>

        <input type="text" id="vendor" placeholder="Store Name (Detected)">
        <input type="number" step="0.01" id="amount" placeholder="Total Amount ($)">
        
        <select id="category">
            <option value="">Select Category...</option>
            <option>Office Furniture</option><option>Insurance</option>
            <option>Comms</option><option>Ent</option>
            <option>Stationary</option><option>Tech</option>
            <option>IT</option><option>Travel</option>
            <option>Corp Gifts</option><option>Accom</option>
            <option>Samples</option><option>Development</option>
            <option>Events</option>
        </select>

        <button onclick="sendToSheet()">🚀 Save to Google Sheets</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzEiBWuR3Q6u7PntTNJu1HmGKzstCtAeyDGQvM1pEgO7jm7MFhtkVH7j7spfw4Qdn1NIQ/exec';
        
        const cameraInput = document.getElementById('cameraInput');
        const status = document.getElementById('status');
        const vendorInput = document.getElementById('vendor');
        const amountInput = document.getElementById('amount');

        cameraInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "⏳ Reading receipt... please wait...";
            
            try {
                const result = await Tesseract.recognize(file, 'eng');
                const fullText = result.data.text;
                const lines = result.data.lines;
                
                console.log("Raw OCR Text:", fullText); // See this in browser console

                // --- 1. BETTER VENDOR DETECTION ---
                // Filter out lines that are too short or just dates/numbers
                let vendorCandidates = lines.slice(0, 6)
                    .map(l => l.text.trim())
                    .filter(t => t.length > 3 && !/\d{2,}/.test(t)); // Must be > 3 chars, no long numbers
                
                if (vendorCandidates.length > 0) {
                    vendorInput.value = vendorCandidates[0].replace(/[^a-zA-Z0-9 ]/g, "");
                }

                // --- 2. BETTER AMOUNT DETECTION ---
                // Looks for: 12.34 or 12,34 or just 12 (as long as it looks like a price)
                const amountRegex = /\d+[\.,]\d{2}/g;
                const matches = fullText.match(amountRegex);
                
                if (matches) {
                    const numbers = matches.map(num => parseFloat(num.replace(',', '.')));
                    const largestAmount = Math.max(...numbers);
                    amountInput.value = largestAmount.toFixed(2);
                    status.innerText = "✅ Analysis Complete!";
                } else {
                    status.innerText = "⚠️ Found text, but couldn't find price.";
                }
            } catch (err) {
                status.innerText = "❌ Scan Error: " + err.message;
            }
        });

        async function sendToSheet() {
            const data = {
                category: document.getElementById('category').value,
                amount: amountInput.value,
                vendor: vendorInput.value || "Manual Entry"
            };

            if (!data.amount || !data.category) {
                alert("Please fill in Amount and Category!");
                return;
            }

            status.innerText = "📤 Sending...";

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify(data)
                });

                status.innerText = "🎉 Saved Successfully!";
                amountInput.value = "";
                vendorInput.value = "";
                document.getElementById('category').value = "";
            } catch (error) {
                status.innerText = "❌ Connection Error";
            }
        }
    </script>
</body>
</html>
