<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Scanner Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f4f9; max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        
        /* Labels & Headings */
        h2 { text-align: center; color: #1c1c1e; font-size: 1.4em; margin-bottom: 20px; }
        label { font-size: 0.75em; color: #007aff; font-weight: bold; margin-left: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Inputs */
        select, input, button { width: 100%; padding: 15px; margin: 8px 0 18px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; -webkit-appearance: none; box-sizing: border-box; }
        
        /* Highlighting the Store Name box for manual correction */
        #vendor { border: 2px solid #e1e1e1; background-color: #fffdf0; transition: border-color 0.3s; }
        #vendor:focus { border-color: #007aff; outline: none; background-color: #ffffff; }

        /* Status Bar */
        #status { color: #555; font-size: 0.85em; text-align: center; margin: 10px 0; font-weight: 600; min-height: 1.5em; background: #f0f0f5; padding: 10px; border-radius: 10px; }
        
        /* Button Style */
        button { background: #34c759; color: white; border: none; font-weight: 700; cursor: pointer; margin-top: 10px; font-size: 18px; }
        button:active { background: #28a745; transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h2>🧾 Quick Scan</h2>
        
        <label>1. Capture Receipt</label>
        <input type="file" accept="image/*" capture="camera" id="cameraInput">
        
        <div id="status">Tap above to take photo</div>

        <label>2. Store Name (Edit if wrong)</label>
        <input type="text" id="vendor" placeholder="Waiting for scan...">

        <label>3. Total Amount ($)</label>
        <input type="number" step="0.01" id="amount" placeholder="0.00">
        
        <label>4. Category</label>
        <select id="category">
            <option value="">Choose...</option>
            <option>Office Furniture</option><option>Insurance</option>
            <option>Comms</option><option>Ent</option>
            <option>Stationary</option><option>Tech</option>
            <option>IT</option><option>Travel</option>
            <option>Corp Gifts</option><option>Accom</option>
            <option>Samples</option><option>Development</option>
            <option>Events</option>
        </select>

        <button onclick="sendToSheet()">🚀 Save to Google Sheets</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzQA0Ki-laEWXyqELKPmUkWWs_i0Ksa5HMSItMaVgsc4xEJ5jQ_4UfPFmoZJEO7MF4ajg/exec';
        
        const cameraInput = document.getElementById('cameraInput');
        const status = document.getElementById('status');
        const vendorInput = document.getElementById('vendor');
        const amountInput = document.getElementById('amount');

        cameraInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            status.innerText = "⏳ AI Analyzing... Please wait.";
            
            try {
                const worker = await Tesseract.createWorker();
                await worker.loadLanguage('eng');
                await worker.initialize('eng');
                
                const { data: { lines, text } } = await worker.recognize(file);
                
                // --- VENDOR LOGIC ---
                let ignoreList = ['TAX', 'INVOICE', 'WELCOME', 'STORE', 'ADDRESS', 'ABN', 'TEL', 'PHONE', 'DATE', 'STR', 'RD', 'VIC', 'NSW', 'QLD'];
                let detectedVendor = "";
                for (let line of lines.slice(0, 8)) {
                    let t = line.text.trim();
                    let upperT = t.toUpperCase();
                    if (t.length > 3 && !ignoreList.some(word => upperT.includes(word)) && !/\d{4,}/.test(t)) {
                        detectedVendor = t.replace(/[^a-zA-Z0-9 ]/g, "");
                        break;
                    }
                }
                
                // Set the value in the box for the user to see/edit
                vendorInput.value = detectedVendor;

                // --- AMOUNT LOGIC ---
                const amountRegex = /\d+[\.,]\d{2}/g;
                let foundAmount = 0;
                
                for (let line of lines) {
                    let t = line.text.toUpperCase();
                    if (t.includes('TOTAL') || t.includes('DUE') || t.includes('BAL') || t.includes('PAY')) {
                        let lineMatches = t.match(amountRegex);
                        if (lineMatches) { 
                            foundAmount = parseFloat(lineMatches[0].replace(',', '.')); 
                            break; 
                        }
                    }
                }
                
                if (foundAmount === 0) {
                    const allMatches = text.match(amountRegex);
                    if (allMatches) {
                        const numbers = allMatches.map(num => parseFloat(num.replace(',', '.')));
                        foundAmount = Math.max(...numbers);
                    }
                }

                if (foundAmount > 0) {
                    amountInput.value = foundAmount.toFixed(2);
                    status.innerText = "✅ Analysis Complete. Correct fields if needed.";
                } else {
                    status.innerText = "⚠️ Found text, but couldn't find price.";
                }

                await worker.terminate();
            } catch (err) {
                status.innerText = "❌ Scan Error. Please try again.";
            }
        });

        async function sendToSheet() {
            // GRAB LATEST DATA: This ensures manual edits are captured
            const data = {
                category: document.getElementById('category').value,
                amount: amountInput.value,
                vendor: vendorInput.value || "Manual Entry"
            };

            if (!data.amount || !data.category) {
                alert("Please ensure Amount and Category are filled!"); 
                return;
            }

            status.innerText = "📤 Syncing to Melbourne Sheet...";
            
            try {
                await fetch(scriptURL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(data) 
                });
                status.innerText = "🎉 Saved Successfully!";
                
                // Clear fields for next entry
                amountInput.value = ""; 
                vendorInput.value = ""; 
                document.getElementById('category').value = "";
            } catch (e) {
                status.innerText = "❌ Connection Failed.";
            }
        }
    </script>
</body>
</html>
